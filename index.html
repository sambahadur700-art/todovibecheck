<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCheck | Seamless Flow</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav>
      <div class="logo">✨ VibeCheck</div>
      <div class="nav-links">
        <button
          class="btn-outline"
          id="signInBtn"
          onclick="openModal('loginModal')"
        >
          Sign In
        </button>
        <button id="signUpBtn" onclick="openModal('signupModal')">
          Join Now
        </button>
        <button
          class="btn-outline"
          id="signOutBtn"
          style="display: none"
          onclick="handleSignOut()"
        >
          Sign Out
        </button>
        <button
          class="btn-outline"
          onclick="window.location.href = 'daily.html'"
        >
          Daily Progress
        </button>
      </div>
    </nav>

    <div class="content-area">
      <div class="hero-text">
        <h1>Your Daily Flow</h1>
        <p>No more white gaps, just pure vibes. 🌊</p>
      </div>

      <div class="wrapper">
        <div class="card">
          <h2>Create a New Habit</h2>
          <div class="inputfield">
            <input
              type="text"
              id="task-input"
              placeholder="What's the move today?"
            />
            <button id="addTask">Add</button>
          </div>
        </div>

        <div class="card">
          <h2>The Journey</h2>
          <div class="taskcontainer" id="taskcontainer"></div>
        </div>
      </div>
    </div>

    <div class="modal" id="loginModal">
      <div class="modal-content">
        <h3>Welcome Back</h3>
        <form onsubmit="handleAuth(event, 'Login')">
          <input type="email" placeholder="Email Address" required />
          <input type="password" placeholder="Password" required />
          <button type="submit" class="submit-btn">Enter the Flow</button>
        </form>
        <div id="googleSignInButton" style="margin-top: 12px"></div>
        <div class="modal-footer">
          New here?
          <span onclick="switchModal('loginModal', 'signupModal')"
            >Create an account</span
          >
        </div>
        <button
          class="action-btn"
          style="margin-top: 15px; background: none; color: #9ca3af"
          onclick="closeAllModals()"
        >
          Close
        </button>
      </div>
    </div>

    <div class="modal" id="signupModal">
      <div class="modal-content">
        <h3>Start Your Journey</h3>
        <form onsubmit="handleAuth(event, 'Sign Up')">
          <input type="text" placeholder="Full Name" required />
          <input type="email" placeholder="Email Address" required />
          <input type="password" placeholder="Create Password" required />
          <button type="submit" class="submit-btn">Get Started</button>
        </form>
        <div class="modal-footer">
          Already a member?
          <span onclick="switchModal('signupModal', 'loginModal')"
            >Sign In</span
          >
        </div>
        <button
          class="action-btn"
          style="margin-top: 15px; background: none; color: #9ca3af"
          onclick="closeAllModals()"
        >
          Close
        </button>
      </div>
    </div>

    <div class="modal" id="editModal">
      <div class="modal-content">
        <h3>Rewrite this vibe?</h3>
        <input
          type="text"
          id="editInput"
          style="width: 100%; border: 1px solid #eee"
        />
        <div style="display: flex; justify-content: flex-end; gap: 10px">
          <button
            class="action-btn"
            style="background: #f3f4f6"
            onclick="closeAllModals()"
          >
            Cancel
          </button>
          <button id="addTask" style="padding: 10px 20px" onclick="saveEdit()">
            Save
          </button>
        </div>
      </div>
    </div>

    <footer>
      <p>Seamlessly designed for your daily routine.</p>
      <div style="font-size: 1.2rem; margin: 10px 0">🌸 🌊 🧘‍♂️</div>
      <p style="font-size: 0.7rem; opacity: 0.6">&copy; 2026 VibeCheck App</p>
    </footer>

    <div id="popup-container" class="popup-container"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="script.js"></script>
  </body>
</html>
